<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinted Sniper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #1C1C1E;
            --primary: #0A84FF;
            --text: #FFFFFF;
            --secondary: #8E8E93;
            --border: #38383A;
            --danger: #FF453A;
            --gold: #FFD60A;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Tabs Navigation */
        .tab-bar {
            display: flex;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--primary);
        }

        /* Content Sections */
        .content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .content.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Forms & Inputs (Apple Style) */
        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 16px; }
        .input-group:last-child { margin-bottom: 0; }
        
        label {
            display: block;
            font-size: 13px;
            color: var(--secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        
        input:focus, select:focus { border-color: var(--primary); }

        /* Button */
        button.btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button.btn:active { opacity: 0.8; transform: scale(0.98); }

        /* Profile & Premium Status */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
        .status-free { background: rgba(255, 69, 58, 0.1); color: var(--danger); }
        .status-premium { background: rgba(255, 214, 10, 0.1); color: var(--gold); }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('search')">🔍 Поиск</div>
        <div class="tab" onclick="switchTab('profile')">👤 Профиль</div>
        <div class="tab" onclick="switchTab('premium')">👑 Premium</div>
    </div>

    <!-- ВКЛАДКА ПОИСК -->
    <div id="search" class="content active">
        <div class="card">
            <div class="input-group">
                <label>Бренд</label>
                <input type="text" id="brand" placeholder="Например: Nike, Carhartt">
            </div>
            <div class="input-group">
                <label>Размер</label>
                <input type="text" id="size" placeholder="S, M, L, 42...">
            </div>
            <div class="input-group">
                <label>Макс. цена (€)</label>
                <input type="number" id="max_price" placeholder="50.00">
            </div>
            <div class="input-group">
                <label>Состояние</label>
                <select id="condition">
                    <option value="">Любое</option>
                    <option value="neuf_avec_etiquette">Новое с биркой</option>
                    <option value="tres_bon">Очень хорошее</option>
                </select>
            </div>
            <button class="btn" onclick="sendSearch()">Добавить поиск</button>
        </div>
    </div>

    <!-- ВКЛАДКА ПРОФИЛЬ -->
    <div id="profile" class="content">
        <div class="profile-header">
            <h2 id="user-name">Загрузка...</h2>
            <p style="color: var(--secondary)">ID: <span id="user-id">...</span></p>
            <div id="status-container"></div>
        </div>
    </div>

    <!-- ВКЛАДКА PREMIUM -->
    <div id="premium" class="content">
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--gold)">Vinted PRO</h2>
            <p style="color: var(--secondary); font-size: 15px;">
                Получайте уведомления быстрее других.<br>
                Мониторинг 24/7 каждую минуту.
            </p>
            <ul style="text-align: left; color: var(--secondary); font-size: 14px; line-height: 1.8;">
                <li>🔥 Неограниченное число поисков</li>
                <li>⚡ Мгновенные push-уведомления</li>
                <li>📸 Фотографии товаров прямо в чат</li>
            </ul>
            <button class="btn" style="background: var(--gold); color: #000;" onclick="buyPremium()">Купить подписку</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Открываем на весь экран

        // Получаем параметры из URL (?id=...&days=...)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || tg.initDataUnsafe?.user?.id || 'Неизвестно';
        const premiumDays = parseInt(urlParams.get('days') || '0');
        const userName = tg.initDataUnsafe?.user?.first_name || 'Пользователь';

        // Заполняем профиль
        document.getElementById('user-name').innerText = userName;
        document.getElementById('user-id').innerText = userId;
        
        const statusContainer = document.getElementById('status-container');
        if (premiumDays > 0) {
            statusContainer.innerHTML = `<div class="status-badge status-premium">PREMIUM (Осталось: ${premiumDays} дн.)</div>`;
        } else {
            statusContainer.innerHTML = `<div class="status-badge status-free">FREE-ВЕРСИЯ</div>`;
        }

        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            tg.HapticFeedback.impactOccurred('light'); // Виброотклик
        }

        // Отправка данных боту
        function sendSearch() {
            if (premiumDays <= 0) {
                tg.showAlert("У вас нет Premium-подписки для добавления поисков!");
                return;
            }

            const data = {
                brand: document.getElementById('brand').value,
                size: document.getElementById('size').value,
                max_price: document.getElementById('max_price').value,
                condition: document.getElementById('condition').value
            };

            if (!data.brand && !data.max_price) {
                tg.showAlert("Заполните хотя бы бренд или цену!");
                return;
            }

            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data)); // Отправляет данные и закрывает WebApp
        }

        function buyPremium() {
            tg.showAlert("Для покупки обратитесь к администратору или настройте авто-оплату в коде.");
        }
    </script>
</body>
</html>
