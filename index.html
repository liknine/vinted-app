<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinted Sniper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #1C1C1E;
            --primary: #0A84FF;
            --text: #FFFFFF;
            --secondary: #8E8E93;
            --border: #38383A;
            --danger: #FF453A;
            --gold: #FFD60A;
            --green: #30D158;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Tabs Navigation */
        .tab-bar {
            display: flex;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--primary);
        }

        .content { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: var(--secondary); margin-bottom: 6px; text-transform: uppercase; }
        input, select {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: var(--text); padding: 12px; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); }

        button.btn {
            width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px;
            border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        button.btn:active { transform: scale(0.98); }

        /* Profile & Searches */
        .profile-header { text-align: center; margin-bottom: 20px; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .status-free { background: rgba(255, 69, 58, 0.1); color: var(--danger); }
        .status-premium { background: rgba(255, 214, 10, 0.1); color: var(--gold); }
        
        .search-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px;
        }
        .search-info { font-size: 15px; }
        .search-price { color: var(--green); font-weight: bold; font-size: 13px; }
        .delete-btn { background: rgba(255, 69, 58, 0.2); color: var(--danger); border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Promo block */
        .promo-box { border: 1px dashed var(--primary); background: rgba(10, 132, 255, 0.05); }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('search')">🔍 Поиск</div>
        <div class="tab" onclick="switchTab('profile')">👤 Профиль</div>
        <div class="tab" onclick="switchTab('premium')">👑 Premium</div>
    </div>

    <!-- ВКЛАДКА ПОИСК -->
    <div id="search" class="content active">
        <div class="card">
            <div class="input-group">
                <label>Бренд</label>
                <input type="text" id="brand" placeholder="Например: Nike, Carhartt">
            </div>
            <div class="input-group">
                <label>Размер</label>
                <input type="text" id="size" placeholder="S, M, L, 42...">
            </div>
            <div class="input-group">
                <label>Макс. цена (€)</label>
                <input type="number" id="max_price" placeholder="50.00">
            </div>
            <div class="input-group">
                <label>Состояние</label>
                <select id="condition">
                    <option value="">Любое</option>
                    <option value="neuf_avec_etiquette">Новое с биркой</option>
                    <option value="tres_bon">Очень хорошее</option>
                </select>
            </div>
            <button class="btn" onclick="sendSearch()">Добавить поиск</button>
        </div>
    </div>

    <!-- ВКЛАДКА ПРОФИЛЬ -->
    <div id="profile" class="content">
        <div class="card profile-header">
            <h2 id="user-name" style="margin: 0 0 5px 0;">Загрузка...</h2>
            <p style="color: var(--secondary); font-size: 14px; margin: 0 0 10px 0;">Chat ID: <span id="user-id">...</span></p>
            <div id="status-container"></div>
        </div>

        <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--secondary);">Ваши активные поиски:</h3>
        <div id="searches-container">
            <!-- Сюда подгрузятся поиски -->
            <p style="color: var(--secondary); font-size: 14px; text-align: center;">Загрузка...</p>
        </div>
    </div>

    <!-- ВКЛАДКА PREMIUM -->
    <div id="premium" class="content">
        <!-- Акция -->
        <div class="card promo-box" style="text-align: center;">
            <h3 style="color: var(--primary); margin-top: 0;">🎁 АКЦИЯ</h3>
            <p style="font-size: 15px; line-height: 1.5; margin-bottom: 0;">
                Пригласи <b>3 друзей</b> и получи<br>
                <span style="color: var(--gold); font-weight: bold;">месяц подписки БЕСПЛАТНО!</span>
            </p>
        </div>

        <!-- Подписка -->
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--gold); margin-top: 0;">Vinted PRO</h2>
            <ul style="text-align: left; color: var(--text); font-size: 15px; line-height: 2; margin-bottom: 20px; list-style-type: '⚡ ';">
                <li><b>30 days</b> access</li>
                <li><b>Unlimited</b> searches</li>
                <li><b>Fast</b> instant alerts</li>
            </ul>
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">10$ <span style="font-size: 14px; color: var(--secondary); font-weight: normal;">/ month</span></div>
            
            <button class="btn" onclick="tg.openTelegramLink('https://t.me/liknine')">Связаться со мной (@liknine)</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Получаем данные из ссылки (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || tg.initDataUnsafe?.user?.id || 'Неизвестно';
        const premiumDays = parseInt(urlParams.get('days') || '0');
        const userName = tg.initDataUnsafe?.user?.first_name || 'Пользователь';
        
        // Достаем JSON с поисками из URL
        let userSearches = [];
        try {
            const searchesRaw = urlParams.get('searches');
            if (searchesRaw) {
                userSearches = JSON.parse(decodeURIComponent(searchesRaw));
            }
        } catch(e) { console.error("Ошибка парсинга поисков"); }

        // 2. Заполняем Профиль
        document.getElementById('user-name').innerText = userName;
        document.getElementById('user-id').innerText = userId;
        
        const statusContainer = document.getElementById('status-container');
        if (premiumDays > 0) {
            statusContainer.innerHTML = `<div class="status-badge status-premium">PREMIUM (Осталось: ${premiumDays} дн.)</div>`;
        } else {
            statusContainer.innerHTML = `<div class="status-badge status-free">FREE-ВЕРСИЯ</div>`;
        }

        // 3. Рисуем список поисков
        const searchesContainer = document.getElementById('searches-container');
        if (userSearches.length === 0) {
            searchesContainer.innerHTML = `<p style="color: var(--secondary); font-size: 14px; text-align: center;">У вас пока нет активных поисков.</p>`;
        } else {
            searchesContainer.innerHTML = '';
            userSearches.forEach(search => {
                const priceText = search.max_price > 0 ? `до ${search.max_price}€` : 'любая цена';
                const brandText = search.brand || 'Любой бренд';
                
                const itemHTML = `
                    <div class="search-item">
                        <div>
                            <div class="search-info"><b>${brandText}</b></div>
                            <div class="search-price">${priceText}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteSearch(${search.id})">Удалить</button>
                    </div>
                `;
                searchesContainer.innerHTML += itemHTML;
            });
        }

        // 4. Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        // 5. Отправка нового поиска
        function sendSearch() {
            if (premiumDays <= 0) {
                tg.showAlert("У вас нет Premium-подписки для добавления поисков!");
                return;
            }
            const data = {
                action: "add",
                brand: document.getElementById('brand').value,
                size: document.getElementById('size').value,
                max_price: document.getElementById('max_price').value,
                condition: document.getElementById('condition').value
            };
            if (!data.brand && !data.max_price) {
                tg.showAlert("Заполните хотя бы бренд или цену!");
                return;
            }
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data)); 
        }

        // 6. Удаление поиска
        function deleteSearch(searchId) {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showConfirm("Удалить этот поиск?", function(isConfirmed) {
                if(isConfirmed) {
                    const data = { action: "delete", search_id: searchId };
                    tg.sendData(JSON.stringify(data)); // Отправляет данные боту и закрывает WebApp
                }
            });
        }
    </script>
</body>
</html>
