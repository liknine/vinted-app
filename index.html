<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Твои стили здесь (белые карточки, синие кнопки) */
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 10px; text-align: center; }
        .input-group input { width: 90%; padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-main { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: white; padding: 10px; border-top: 1px solid #eee; }
        .nav div { flex: 1; text-align: center; color: #999; }
        .active { color: #007bff !important; }
    </style>
</head>
<body>

<div id="page-search">
    <div class="card">
        <h3>🔍 Поиск и фильтры</h3>
        <input type="text" id="brand" placeholder="Название бренда">
        <input type="text" id="size" placeholder="Размер">
        <input type="number" id="price" placeholder="Макс цена €">
        <button class="btn-main" onclick="addSearch()">ДОБАВИТЬ ПОИСК</button>
    </div>
</div>

<div id="page-profile" style="display:none;">
    <div class="card">
        <h2>User</h2>
        <p>Chat ID: <b id="u_id">000000</b></p>
        <p id="u_status">FREE</p>
        <p>Дней осталось: <span id="u_days">0</span></p>
    </div>
</div>

<div class="nav">
    <div onclick="show('page-search', this)" class="active">Поиск</div>
    <div onclick="show('page-profile', this)">Профиль</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const params = new URLSearchParams(window.location.search);

    // ОТОБРАЖАЕМ ID ИЗ БОТА
    document.getElementById('u_id').innerText = params.get('id') || "Не найден";
    const days = params.get('days') || "0";
    document.getElementById('u_days').innerText = days;
    if(parseInt(days) > 0) document.getElementById('u_status').innerText = "💎 PREMIUM";

    function show(id, el) {
        document.getElementById('page-search').style.display = 'none';
        document.getElementById('page-profile').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav div').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    function addSearch() {
        const data = {
            action: "add_search",
            brand: document.getElementById('brand').value,
            size: document.getElementById('size').value,
            price: document.getElementById('price').value
        };
        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
