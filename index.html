<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #fff);
            --text: var(--tg-theme-text-color, #000);
            --hint: var(--tg-theme-hint-color, #999);
            --btn: var(--tg-theme-button-color, #248bed);
            --btn-text: var(--tg-theme-button-text-color, #fff);
        }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--hint); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; background: var(--bg); color: var(--text); }
        button { width: 100%; padding: 15px; background-color: var(--btn); color: var(--btn-text); border: none; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <h3>🔎 Новый поиск</h3>
    <div class="form-group">
        <label>Что ищем?</label>
        <input type="text" id="name" placeholder="Например: Stone Island Shadow Project">
    </div>
    <div class="form-group">
        <label>Категория</label>
        <select id="category">
            <option value="👟 Обувь">👟 Обувь</option>
            <option value="👕 Одежда">👕 Одежда</option>
        </select>
    </div>
    <div class="form-group">
        <label>Максимальная цена (€)</label>
        <input type="number" id="price" placeholder="40">
    </div>
    <button id="main_btn">ДОБАВИТЬ В СНАЙПЕР</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('main_btn').onclick = function() {
            let name = document.getElementById('name').value;
            let price = document.getElementById('price').value;
            
            if (!name || !price) {
                tg.showAlert("Заполни все поля!");
                return;
            }

            let data = {
                name: name,
                category: document.getElementById('category').value,
                price: parseInt(price)
            };

            tg.sendData(JSON.stringify(data)); // Отправляем данные боту
            tg.close();
        };
    </script>
</body>
</html>
